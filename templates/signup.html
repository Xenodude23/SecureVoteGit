<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Digital Trust Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- No intro animation here to ensure users can register instantly if they navigate here -->
    <div class="auth-container fade-in" style="opacity: 1;">
        <h1>🎓 Voter Registration</h1>
        <p>Create your account (One ID per student)</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <input type="text" name="username" placeholder="Choose a Username" required>
            <input type="text" name="college_id" placeholder="College ID (e.g., SPTCS034)" required pattern="[A-Za-z0-9]+" title="Alphanumeric only">
            <input type="password" name="password" placeholder="Create Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            <button type="submit">Register Account</button>
        </form>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <p class="error">{{ messages[0] }}</p>
            {% endif %}
        {% endwith %}

        <p style="margin-top: 20px;">Already have an account? <a href="{{ url_for('login') }}">Login Here</a></p>
    </div>
</body>
</html>
